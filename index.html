<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List — UY1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- EN-TÊTE -->
  <header>
    <h1>Jordy todo List </h1>
    <p>Université de Yaoundé I</p>
  </header>

  <!-- CONTENU PRINCIPAL -->
  <main>

    <!-- FORMULAIRE D'AJOUT -->
    <div class="formulaire">
      <input type="text" id="champ-tache" placeholder="Ex: Réviser les TD de Maths..." />
      <button id="btn-ajouter">Ajouter</button>
    </div>

    <!-- STATISTIQUES -->
    <div class="stats">
      <span>Total : <strong id="nb-total">0</strong></span>
      <span>Faites : <strong id="nb-faites">0</strong></span>
      <span>Restantes : <strong id="nb-restantes">0</strong></span>
    </div><br>

    <!-- LISTE DES TÂCHES -->
    <ul id="liste-taches"></ul><br><br>

    <!-- BOUTON EFFACER -->
    <button id="btn-effacer">🗑 Supprimer les tâches faites</button>

  </main>

  <script src="script.js"></script>
</body>
</html>
